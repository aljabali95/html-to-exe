name: Build EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: express-wash-exe
          path: dist/*.exe
          retention-days: 30
